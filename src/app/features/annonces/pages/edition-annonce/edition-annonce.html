<div class="page-container">
  <h1>{{ annonceId ? 'Modifier une annonce' : 'Créer une annonce' }}</h1>

  <form [formGroup]="annonceForm" (ngSubmit)="saveAnnonce()" class="form-grid">
       <div class="field-group">
      <label for="titre">Titre</label>
      <input id="titre" type="text" formControlName="titre" />
    </div>

    <div class="field-group">
      <label for="descriptionCourte">Description courte</label>
      <textarea id="descriptionCourte" rows="3" formControlName="descriptionCourte"></textarea>
    </div>

    <div class="field-group">
      <label for="descriptionLongue">Description longue</label>
      <textarea id="descriptionLongue" rows="5" formControlName="descriptionLongue"></textarea>
    </div>

    <div class="field-group">
      <label for="mensualite">Mensualité</label>
      <input id="mensualite" type="number" formControlName="mensualite" />
    </div>

    <div class="field-group">
      <label for="dateDisponibilite">Date disponibilité</label>
      <input id="dateDisponibilite" type="date" formControlName="dateDisponibilite" />
    </div>

    <div class="field-group">
      <label for="adresse">Adresse</label>
      <input id="adresse" type="text" formControlName="adresse" />
    </div>

    <div class="active-toggle">
      <mat-checkbox formControlName="actif">Publier cette annonce</mat-checkbox>
      <p class="field-hint">Si décoché, l'annonce sera enregistrée mais non visible publiquement.</p>
    </div>

    <div class="photo-upload">
      <label for="photos">Ajouter photos</label>
      <input id="photos" type="file" accept="image/*" multiple (change)="onPhotoSelected($event)" />
       <p class="field-error" *ngIf="annonceForm.get('photos')?.invalid && annonceForm.get('photos')?.touched">
        Au moins une photo est obligatoire.
      </p>
    </div>

    <div class="photos-preview" *ngIf="photos.length > 0">
      <div class="photo-item" *ngFor="let photo of photos; let i = index">
        <img [src]="photo" alt="Aperçu photo annonce" />
        <button mat-button type="button" color="warn" (click)="removePhoto(i)">Supprimer</button>
      </div>
    </div>

    <button mat-raised-button color="primary" type="submit">
      {{ annonceId ? 'Enregistrer les modifications' : 'Créer l\'annonce' }}
    </button>
  </form>
</div>
