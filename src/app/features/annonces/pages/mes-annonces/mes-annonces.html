<div class="page-container">
  <h1>Mes annonces</h1>
  
  <ng-container *ngIf="mesAnnonces$ | async as mesAnnonces; else loadingTpl">
    <div *ngIf="mesAnnonces.length === 0" class="empty-state">
      <p>Vous n'avez aucune annonce pour le moment.</p>
    </div>
    
      <div class="annonces-list" *ngIf="mesAnnonces.length > 0">
      <mat-card *ngFor="let annonce of mesAnnonces" class="annonce-item">
        <mat-card-title>{{ annonce.titre }}</mat-card-title>
        <mat-card-subtitle>{{ annonce.adresse }}</mat-card-subtitle>
         <p>{{ annonce.consultations }} consultations</p> 

        <mat-card-actions>
          <button mat-stroked-button color="primary" (click)="modifierAnnonce(annonce.id)">
            Modifier
          </button>
          <button mat-button color="accent" (click)="toggleActif(annonce)">
            {{ annonce.actif ? 'Désactiver' : 'Réactiver' }}
          </button>
        </mat-card-actions>
      </mat-card>
    </div>
  </ng-container>
</div>

<ng-template #loadingTpl>
  <div class="loading-container">
    <p>Chargement...</p>
  </div>
</ng-template>
